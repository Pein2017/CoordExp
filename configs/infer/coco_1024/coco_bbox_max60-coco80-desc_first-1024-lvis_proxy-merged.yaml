# COCO 1024-budget inference preset for the exported Stage-1 2B LVIS-proxy merged checkpoint.
#
# Run inference only:
#   PYTHONPATH=. conda run -n ms python scripts/run_infer.py \
#     --config configs/infer/coco_1024/coco_bbox_max60-coco80-desc_first-1024-lvis_proxy-merged.yaml
#
# Then score detections:
#   PYTHONPATH=. conda run -n ms python scripts/postop_confidence.py \
#     --config configs/postop/coco_1024/val_200_lvis_proxy_merged.yaml
#
# Then evaluate all GT views from the same run:
#   PYTHONPATH=. conda run -n ms python scripts/evaluate_proxy_detection_bundle.py \
#     --config configs/eval/coco_1024/val_200_lvis_proxy_bundle.yaml

run:
  name: coco1024_val200_lvis_proxy_merged_2b
  output_dir: output/infer

stages:
  infer: true
  eval: false
  vis: false

infer:
  gt_jsonl: public_data/coco/rescale_32_1024_bbox_max60_lvis_proxy/val.coord.jsonl
  model_checkpoint: output/stage1_2b/coco_bbox_max60-coco80-desc_first-1024-lvis_proxy-merged

  prompt_variant: coco_80
  object_field_order: desc_first
  object_ordering: sorted

  mode: auto
  pred_coord_mode: auto

  backend:
    type: hf

  generation:
    temperature: 0.0
    top_p: 0.9
    max_new_tokens: 3084
    repetition_penalty: 1.05
    batch_size: 4
    seed: 42

  device: cuda:0
  limit: 0
  detect_samples: 128
