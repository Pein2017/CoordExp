decode:
  dataset_variant: lvis_proxy
  pipeline_config: configs/infer/pipeline.yaml
  val200_source_jsonl: /data/CoordExp/public_data/coco/rescale_32_1024_bbox_max60_lvis_proxy/val.norm.jsonl
  device: cuda:0
  semantic_device: cuda:0
  top_p: 0.9
  max_new_tokens: 3084
  batch_size: 1
  seed: 42
  detect_samples: 128
  stop_pressure_mode: suppress_terminating_tokens_after_object_boundary
  stop_pressure_min_new_tokens: 0
  views: [coco_real, coco_real_strict, coco_real_strict_plausible]
  semantic_model: model_cache/all-MiniLM-L6-v2-local
  semantic_threshold: 0.5
  semantic_batch_size: 64
  num_workers: 8
  metrics: both
  use_segm: false
  strict_parse: false
  lvis_max_dets: 300
  f1ish_iou_thrs: [0.3, 0.5]
  f1ish_pred_scope: annotated

scoring:
  device: cuda:0
  attn_implementation: auto
  repetition_penalties: [1.0, 1.02, 1.05, 1.10]

models:
  base_only:
    alias: base_only
    base_path: /data/CoordExp/model_cache/models/Qwen/Qwen3-VL-2B-Instruct-coordexp
    adapter_path: null
    prompt_variant: coco_80
    object_field_order: desc_first
    coord_mode: norm1000_text
  base_plus_adapter:
    alias: base_plus_adapter
    base_path: /data/CoordExp/model_cache/models/Qwen/Qwen3-VL-2B-Instruct-coordexp
    adapter_path: /data/CoordExp/output/stage1_2b/coco_bbox_max60-coco80-desc_first-1024-lvis_proxy-raw_text_xyxy-pure_ce/epoch_4-raw_text_xyxy-pure_ce-coco80-desc_first-1024-lvis_proxy-from-base-2B/v1-20260417-084341/checkpoint-552
    prompt_variant: coco_80
