run:
  name: raw-text-coordinate-mechanism-good-basin-20260421
  output_dir: output/analysis
  stages: [audit, pilot, report]

models:
  base:
    alias: base
    path: model_cache/models/Qwen/Qwen3-VL-2B-Instruct-coordexp
    prompt_surface: upper_bound
    coord_mode: norm1000_text
    prompt_variant: coco_80
    object_field_order: desc_first
    json_surface: pretty_inline
  pure_ce:
    alias: pure_ce
    path: output/stage1_2b/coco_bbox_max60-coco80-desc_first-1024-lvis_proxy-raw_text_xyxy-pure_ce/epoch_4-raw_text_xyxy-pure_ce-coco80-desc_first-1024-lvis_proxy-from-base-2B/v1-20260417-084341/checkpoint-552
    prompt_surface: canonical
    coord_mode: norm1000_text
    prompt_variant: coco_80
    object_field_order: desc_first
    json_surface: pretty_inline

cohorts:
  val_headline:
    jsonl_path: public_data/coco/rescale_32_1024_bbox_max60/val.norm.jsonl
    sample_count: 128
    seed: 17
  train_supplemental:
    jsonl_path: public_data/coco/rescale_32_1024_bbox_max60/train.norm.jsonl
    sample_count: 128
    seed: 29

scoring:
  device: cuda:0
  attn_implementation: auto
  pilot_cohort: val_headline
  pilot_max_rows_per_model: 64
  pilot_max_objects_per_row: 1
  pilot_candidate_radius: 8
  pilot_slots: [x1, y1]
