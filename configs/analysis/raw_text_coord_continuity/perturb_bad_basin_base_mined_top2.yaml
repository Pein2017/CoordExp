run:
  name: raw-text-bad-basin-perturb-base-mined-top2
  output_dir: output/analysis

selection:
  bad_basin_summary_json: output/analysis/raw-text-bad-basin-model-mined-base-coordexp-val200-relaxed-norm1000/bad_basin/summary.json
  cohort_jsonl: output/analysis/raw-text-continuity-hard-mining-2026-04-18/model_mined_duplicate_prone_base_coordexp_val200_relaxed_norm1000.jsonl
  max_cases: 2
  target_model_alias: base
  slots: [x1, y1]
  require_positive_advantage: true

models:
  base:
    alias: base
    path: model_cache/models/Qwen/Qwen3-VL-2B-Instruct-coordexp
    prompt_surface: upper_bound
    coord_mode: norm1000_text
    prompt_variant: coco_80
    object_field_order: desc_first
    json_surface: pretty_inline
  pure_ce:
    alias: pure_ce
    path: output/stage1_2b/coco_bbox_max60-coco80-desc_first-1024-lvis_proxy-raw_text_xyxy-pure_ce/epoch_4-raw_text_xyxy-pure_ce-coco80-desc_first-1024-lvis_proxy-from-base-2B/v1-20260417-084341/checkpoint-552
    prompt_surface: canonical
    coord_mode: norm1000_text
    prompt_variant: coco_80
    object_field_order: desc_first
    json_surface: pretty_inline

scoring:
  device: cuda:1
  attn_implementation: auto
  candidate_radius: 8
