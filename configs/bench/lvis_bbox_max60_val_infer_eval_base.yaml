# Base config for LVIS bbox-only validation inference + evaluation.
#
# This repo's unified inference pipeline treats YAML configs as single files:
# - no extends/inherit across files
# - no variable interpolation
#
# To create a new run, copy this file and edit:
# - run.name
# - infer.model_checkpoint
# - infer.limit (optional)
#
# Entrypoint:
#   PYTHONPATH=. conda run -n ms python scripts/run_infer.py --config <this.yaml>

run:
  name: TEMPLATE
  output_dir: output/bench

stages:
  infer: true
  eval: true
  vis: false

infer:
  # This Stage-1-style 1024 export is the right default for bbox pretraining and
  # quick inference checks, but it does not carry federated LVIS metadata yet.
  # Keep eval.metrics at f1ish here unless you swap in a regenerated metadata-bearing
  # LVIS JSONL from the updated converter path.
  gt_jsonl: public_data/lvis/rescale_32_1024_bbox_max60/val.coord.jsonl
  model_checkpoint: output/stage2_ab/REPLACE_ME
  prompt_variant: lvis_stage2_federated
  object_field_order: desc_first
  object_ordering: sorted

  # coord | text | auto
  mode: auto
  pred_coord_mode: auto

  backend:
    # hf | vllm
    type: hf

    # If you switch to vllm, you typically want an externally managed server:
    # type: hf
    base_url: http://127.0.0.1:8000
    auto_launch: false
    timeout_s: 180.0
    client_concurrency: 8

  generation:
    temperature: 0.1
    top_p: 0.9
    max_new_tokens: 3084
    repetition_penalty: 1.1
    # Batch decoding:
    # - HF: micro-batched `model.generate()` when > 1
    # - vLLM: concurrent requests per flush when > 1
    batch_size: 8
    seed: 42

  device: cuda:0
  limit: 0
  detect_samples: 128

eval:
  output_dir: null  # defaults to <run_dir>/eval
  metrics: f1ish
  lvis_max_dets: 300
  use_segm: false
  overlay: false
  overlay_k: 12
  num_workers: 8
  semantic_model: model_cache/all-MiniLM-L6-v2-local
  semantic_device: cuda:0
  semantic_batch_size: 64
  semantic_threshold: 0.5
