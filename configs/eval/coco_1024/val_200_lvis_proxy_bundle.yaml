# Run all COCO + proxy-expanded evaluation views from one scored run directory.
#
# Prerequisites:
# 1. Infer once with configs/infer/coco_1024/val_200_lvis_proxy_merged.yaml
# 2. Score once with configs/postop/coco_1024/val_200_lvis_proxy_merged.yaml
#
# Run:
#   PYTHONPATH=. conda run -n ms python scripts/evaluate_proxy_detection_bundle.py \
#     --config configs/eval/coco_1024/val_200_lvis_proxy_bundle.yaml

run_dir: output/infer/coco1024_val200_lvis_proxy_merged

artifacts:
  scored_jsonl: output/infer/coco1024_val200_lvis_proxy_merged/gt_vs_pred_scored.jsonl
  proxy_views_dir: output/infer/coco1024_val200_lvis_proxy_merged/proxy_eval_views
  output_root: output/infer/coco1024_val200_lvis_proxy_merged
  summary_json: output/infer/coco1024_val200_lvis_proxy_merged/proxy_eval_bundle_summary.json

views:
  - coco_real
  - coco_real_strict
  - coco_real_strict_plausible

metadata_namespace: coordexp_proxy_supervision

eval:
  metrics: both
  use_segm: false
  strict_parse: false
  lvis_max_dets: 300

  overlay: false
  overlay_k: 12
  num_workers: 8

  semantic_model: model_cache/all-MiniLM-L6-v2-local
  semantic_threshold: 0.5
  semantic_device: cuda:0
  semantic_batch_size: 64

  f1ish_iou_thrs: [0.3, 0.5]
  f1ish_pred_scope: annotated

