extends:
  - ../../_shared/coord_soft_ce_gate_4b.yaml
  - ../../../_shared/datasets/coco_768_bbox_max60.yaml
  - ../../_shared/loss_coord_soft_ce_gate_strong.yaml

model:
  model: model_cache/models/Qwen/Qwen3-VL-4B-Instruct-coordexp

training:
  artifact_subdir: stage1/coco_bbox_max60-hard_ce_soft_ce_gate
  run_name: epoch_4-hard_ce_soft_ce_gate-LRs-2e-4_1e-4_4e-4-from-base-4B

custom:
  object_field_order: desc_first
  # Mixed coord loss:
  #   - base CE: standard full-vocab CE on non-coord tokens (coord targets are masked)
  #   - coord loss: coord-only (CE + softCE + gate) on coord-token positions
  coord_soft_ce_w1:
    ce_weight: 1.0
