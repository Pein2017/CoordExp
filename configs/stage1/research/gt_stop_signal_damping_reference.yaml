extends: ../sft_base.yaml

training:
  run_name: stage1_gt_stop_signal_damping_reference
  output_dir: output/stage1/research/gt_stop_signal_damping_reference
  logging_dir: tb/stage1/research/gt_stop_signal_damping_reference

custom:
  extra:
    stop_signal_damping_reference:
      note: >
        Reference-only Stage-1 YAML surface for the shared GT text stop-signal experiment.
        The executable implementation in this change is the shared `context=gt` token-ce
        path plus the Stage-2 Channel-A A1 trainer/logging integration.
      token_ce:
        config:
          stop_signal_damping:
            enabled: true
            min_weight: 0.3
            max_weight: 0.75
            branch_temperature: 1.25
            curve_gamma: 2.0
            detach_gate: true
      expected_metrics:
        objective: loss/gt_text/stop_signal_ce
        diagnostics:
          - stop_signal/gt/eligible_seq_count
          - stop_signal/gt/branch_count
          - stop_signal/gt/weight_mean
          - stop_signal/gt/p_stop_mean
          - stop_signal/gt/p_cont_mean
          - stop_signal/gt/margin_mean
