extends: ./geometry_first_coco80.yaml

training:
  run_name: smoke_stage1_geometry_first_coco80_gradmon

custom:
  extra:
    loss_gradient_monitor:
      enabled: true
      interval_steps: 1
      ema_beta: 0.98
      require_sync_gradients: true
      coord_only: true
      granularity: atomic
      param_block:
        strategy: auto_last_lm_layernorm
        max_params: 64
        max_numel: 200000
