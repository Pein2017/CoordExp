extends:
  - _shared/coord_soft_ce_gate_4b.yaml
  - ../_shared/datasets/lvis_1024_bbox_max60.yaml
  - ../_shared/prompts/lvis_stage1_federated.yaml

model:
  model: output/stage1/coco_bbox_max60-coco80-desc_first/epoch_4-softce_w1-coco80-ckpt_1832-merged

training:
  artifact_subdir: stage1/lvis_bbox_max60_1024
  num_train_epochs: 2
  effective_batch_size: 128
  run_name: epoch_2-hard_ce_soft_ce_w1_ciou_bbox_size

custom:
  coord_soft_ce_w1:
    enabled: true
    ce_weight: 1.0
    soft_ce_weight: 1.0
    w1_weight: 1.0
    gate_weight: 5.0
    temperature: 0.9
    target_sigma: 1.5
    target_truncate: 8
  bbox_geo:
    enabled: true
    smoothl1_weight: 0.01
    ciou_weight: 1.0
  bbox_size_aux:
    enabled: true
    log_wh_weight: 0.05
    oversize_penalty_weight: 0.0
    oversize_area_frac_threshold: null
    oversize_log_w_threshold: null
    oversize_log_h_threshold: null
    eps: 1.0e-6
  eval_detection:
    enabled: false
    metrics: lvis
    lvis_annotations_json: public_data/lvis/raw/annotations/lvis_v1_val.json
