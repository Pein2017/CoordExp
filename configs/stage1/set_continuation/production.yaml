extends:
  - ../_shared/coord_soft_ce_gate_2b.yaml
  # Keep the first production run on the original COCO Stage-1 coord-token
  # surface on purpose. LVIS-proxy should be tested next as a dataset-choice
  # ablation rather than mixed into this objective-change run.
  - ../../_shared/datasets/coco_1024_bbox_max60.yaml
  - ../../_shared/prompts/coco80_desc_first.yaml

model:
  model: output_remote/stage1_2b/coco_bbox_max60-hard_ce_soft_ce_w1_gate/epoch_4-from-base-2B/v0-20260227-050057/checkpoint-1332-merged-full

training:
  output_root: /data/CoordExp/output_remote/stage1_2b/set_continuation
  logging_root: /data/CoordExp/output_remote/stage1_2b/set_continuation/tb
  artifact_subdir: coco1024_sota1332_setcont_pem_close_suppress
  run_name: setcont-coco1024-sota1332-pem-close-suppress
  packing: false
  eval_packing: false
  encoded_sample_cache:
    enabled: false
  num_train_epochs: 4
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  effective_batch_size: 128
  learning_rate: 5.0e-5
  vit_lr: 1.0e-5
  aligner_lr: 5.0e-5
  metric_for_best_model: eval_det_bbox_AP
  greater_is_better: true
  eval_steps: 100
  save_steps: 200
  logging_steps: 10
  logging_first_step: true
  save_total_limit: 2
  save_delay_steps: 600
  ddp_find_unused_parameters: false
  ddp_broadcast_buffers: false

deepspeed:
  enabled: false

benchmark:
  group_id: stage1_set_continuation_full_features
  control_group_id: stage1_sft_sota1332
  intended_variable: subset-conditioned full-entry multi-positive continuation with close-start suppression and fixed-rho PEM threshold loss
  comparability_label: accuracy-comparable

experiment:
  title: Stage-1 set-continuation full-feature production
  purpose: Continue training the SOTA coord-token Stage-1 SFT checkpoint with the new set-continuation objective.
  hypothesis: Full-entry multi-positive supervision with subset prefixes, close-start suppression, and fixed-rho PEM threshold loss improves continuation recall and reduces fixed-order competition.
  baseline: output_remote/stage1_2b/coco_bbox_max60-hard_ce_soft_ce_w1_gate/epoch_4-from-base-2B/v0-20260227-050057/checkpoint-1332-merged-full
  key_deviations:
    - "trainer_variant: stage1_set_continuation"
    - "objective: fixed-rho PEM threshold loss with full-entry MP diagnostic"
    - "dataset: original COCO coord-token train surface; LVIS-proxy is reserved for follow-up dataset ablation"
    - "prefix sampling: balanced empty/random/leave-one-out mixture"
    - "structural close: close-start suppression enabled when observed GT remains; weak final schema close disabled"
    - "execution: smart batched exact branch scoring with supervised suffix logits, no DDP padding forwards, and 8-candidate approximate fallback for over-budget samples"
    - "prefix reuse: disabled in this bridge; GPU KV cache and branch attention mask disabled"
    - "coordinates: coord-token-only scoring; raw-text integer coordinates unsupported"
  runtime_settings:
    - "packing=false and eval_packing=false"
    - "checkpoint_mode=artifact_only; stage1_set_continuation prunes checkpoint state files and keeps adapter artifacts only"
    - "deepspeed.enabled=false because repeated independent candidate forwards are incompatible with ZeRO-2 reduction"
    - "training.ddp_find_unused_parameters=false"
    - "training.ddp_broadcast_buffers=false is required by no-padding DDP candidate synchronization"
    - "microbatch scaling: per_device_train_batch_size=8 and gradient_accumulation_steps=2 preserve global effective_batch_size=128 while spending more GPU memory on useful local work"
    - "train_forward.branch_runtime=smart_batched_exact; train_forward.logits.mode=supervised_suffix; train_forward.ddp_sync.candidate_padding=none"
    - "branch_batching.strategy=ms_swift_constant_volume_buckets; max_branch_rows=8; smart batching is exact for selected candidates and does not enable prefix KV cache"
    - "candidate budget exact_until.max_candidates=8 and fallback.max_candidates=8; cap-8 fallback is approximate and telemetry-required"
    - "prefix logits are exact suffix-only scoring, not a detached-prefix or KV-cache approximation"
    - "num_train_epochs=4"
    - "effective_batch_size=128"
    - "lr: llm=5e-5, vit=1e-5, aligner=5e-5, coord_offset=5e-5"
    - "metric_for_best_model=eval_det_bbox_AP"
    - "val_sample_limit=200"
  tags:
    - stage1
    - set-continuation
    - multi-positive
    - pem
    - close-start-suppression
    - coord-token

custom:
  trainer_variant: stage1_set_continuation
  val_sample_limit: 200
  coord_offset:
    embed_lr: 5.0e-5
    head_lr: 5.0e-5
  coord_soft_ce_w1:
    enabled: false
  bbox_geo:
    enabled: false
    smoothl1_weight: 0.0
    ciou_weight: 0.0
  bbox_size_aux:
    enabled: false
    log_wh_weight: 0.0
    oversize_penalty_weight: 0.0
    oversize_area_frac_threshold: null
    oversize_log_w_threshold: null
    oversize_log_h_threshold: null
    eps: 1.0e-6
  stage1_set_continuation:
    subset_sampling:
      empty_prefix_ratio: 0.30
      random_subset_ratio: 0.50
      leave_one_out_ratio: 0.20
      full_prefix_ratio: 0.0
      prefix_order: random
    candidates:
      mode: exact
      max_candidates: null
    structural_close:
      close_start_suppression_weight: 0.05
      final_schema_close_weight: 0.0
    positive_evidence_margin:
      objective: threshold_loss
      threshold_space: full_entry_logZ
      rho: 0.90
      threshold_calibration: fixed_rho_0.90_no_external_evaluator_v1
    train_forward:
      branch_runtime:
        mode: smart_batched_exact
      branch_batching:
        enabled: true
        strategy: ms_swift_constant_volume_buckets
        max_branch_rows: 8
        max_branch_tokens: null
        min_fill_ratio: 0.70
        padding_waste_warn_fraction: 0.40
      logits:
        mode: supervised_suffix
      ddp_sync:
        candidate_padding: none
      budget_policy:
        enabled: true
        exact_until:
          max_candidates: 8
        fallback:
          mode: approximate_uniform_subsample
          max_candidates: 8
          estimator: uniform_importance
          require_telemetry: true
      prefix_reuse:
        encoding_cache: false
        kv_cache:
          mode: disabled
      telemetry:
        per_rank_memory: true
        branch_budget: true
        objective_fidelity: true
  eval_detection:
    enabled: true
    metrics: both
    score_mode: confidence_postop
    strict_parse: true
    limit: 200
    batch_size: 4
    distributed: true
    max_new_tokens: 3084
    temperature: 0.0
    top_p: 1.0
    repetition_penalty: 1.05
    f1ish_pred_scope: annotated
  extra:
    benchmark_report:
      eval_scope: val200
      eval_view: coco_map_with_logprob_confidence_plus_f1ish_annotated
      dataset_choice: original_coco_coord_token_train_surface
      dataset_ablation_note: original_coco_first_lvis_proxy_followup
      prediction_surface: coord_token_xyxy
      score_mode: confidence_postop_bbox_logprob_confidence_exp
      decoding_controls: greedy_temp0_top_p1_rep1p05
      same_budget_label: smart_batched_exact_suffix_no_ddp_padding_cap8_v1
      train_forward_budget: smart_batched_exact_suffix_no_ddp_padding_cap8_v1
      objective_fidelity_note: exact suffix-logit scoring for samples with <=8 remaining candidates; approximate_uniform_subsample is explicit and telemetry-required for over-budget samples
      sparse_label_caveat: annotated_view_may_count_unlabeled_true_positives_as_fp
