# DORMANT LEGACY EXAMPLE
# ----------------------
# This file is kept in-tree so runtime fusion can be reactivated later.
# The current canonical training surface rejects `custom.fusion_config`, so this
# example is not runnable as-is today.

targets:
  - dataset: lvis
    name: lvis
    train_jsonl: public_data/lvis/rescale_32_768_bbox_max60/train.bbox_only.max60.coord.jsonl
    val_jsonl: public_data/lvis/rescale_32_768_bbox_max60/val.bbox_only.max60.coord.jsonl
    template: poly_preferred
    ratio: 1.0

sources:
  - dataset: vg
    name: vg
    train_jsonl: public_data/vg/rescale_32_768_bbox/train.coord.jsonl
    val_jsonl: null
    template: poly_preferred
    ratio: 0.2
