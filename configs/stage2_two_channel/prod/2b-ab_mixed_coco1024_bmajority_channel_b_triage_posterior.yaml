extends:
  - ./ab_mixed.yaml
  - ../../_shared/datasets/coco_1024_bbox_max60.yaml

global_max_length: 14000

model:
  model: output/stage1_2b/coco_bbox_max60-hard_ce_soft_ce_w1_gate_merged-1332

training:
  num_train_epochs: 1
  effective_batch_size: 96
  run_name: eff_size_96-b_ratio_0.75-triage_posterior-epoch_1
  artifact_subdir: stage2_ab/prod/2b-ab_mixed_coco1024_bmajority_channel_b_triage_posterior

stage2_ab:
  schedule:
    b_ratio: 0.75
  channel_b:
    triage_posterior:
      num_rollouts: 2
      explorer_temperature: 0.7
      explorer_top_p: 0.95
      explorer_top_k: 64
      unlabeled_consistent_iou_threshold: 0.9
      recovered_ground_truth_weight_multiplier: 2.0

rollout_matching:
  train_monitor_dump:
    every_channel_b_steps: 30
  max_new_tokens: 3084
  channel_b_decode_batch_size: 32
  eval_decode_batch_size: 32
  vllm:
    gpu_memory_utilization: 0.9
