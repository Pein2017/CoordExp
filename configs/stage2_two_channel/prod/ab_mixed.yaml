extends: ../base.yaml
global_max_length: 14000


model:
  model: output/stage2_ab/coco_bbox_max60/a_only/epoch_2-eff_size_64-n_softctx_iter_2-merged

training:
  num_train_epochs: 2
  run_name: eff_size_98-b_ratio_0.75-n_softctx_iter_2-epoch_2
  output_dir: output/stage2_ab/prod/ab_mixed
  logging_dir: tb/stage2_ab/prod/ab_mixed
  learning_rate: 2.0e-5
  vit_lr: 2.0e-5
  aligner_lr: 5.0e-5
  effective_batch_size: 98
  eval_strategy: steps
  save_strategy: steps
  save_steps: 300
  do_eval: true
  eval_steps: 300
  metric_for_best_model: rollout/mAP

stage2_ab:
  schedule: {b_ratio: 0.75}
  n_softctx_iter: 2
  channel_b:
    ddp_phase_timeout_s: 180.0
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        config:
          desc_ce_weight: 1.0
          self_context_struct_ce_weight: 0.1
          rollout_fn_desc_weight: 1.0
          rollout_matched_prefix_struct_weight: 1.0
          rollout_drop_invalid_struct_ce_multiplier: 1.0
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        config:
          smoothl1_weight: 2.0
          ciou_weight: 0.2
          a1_smoothl1_weight: 0.0
          a1_ciou_weight: 0.0
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        config:
          coord_ce_weight: 0.02
          coord_el1_weight: 0.0
          coord_ehuber_weight: 0.0
          coord_huber_delta: 0.001
          coord_entropy_weight: 0.0
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          self_context_soft_ce_weight: 0.1
          w1_weight: 0.1
          a1_soft_ce_weight: 0.0
          a1_w1_weight: 0.0
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}

custom:
  val_sample_limit: 504
  extra:
    prompt_variant: coco_80

rollout_matching:
  rollout_backend: vllm
  eval_rollout_backend: vllm
  offload:
    enabled: false
  max_new_tokens: 2560
  channel_b_decode_batch_size: 14
  eval_decode_batch_size: 14
  monitor_dump:
    enabled: true
    every_steps: 100
    max_events: 0
    max_samples: 10
    max_text_chars: 0
    write_markdown: false
  vllm:
    mode: server
    tensor_parallel_size: 1
    enforce_eager: true
    gpu_memory_utilization: 0.8
    max_model_len: 14000
    enable_lora: false
    enable_prefix_caching: true
    server:
      timeout_s: 240.0
      infer_timeout_s: 240.0
      servers:
        - base_url: http://127.0.0.1:8000
          group_port: 51216
