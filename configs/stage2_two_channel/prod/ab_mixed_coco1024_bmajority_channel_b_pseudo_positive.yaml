extends: ./ab_mixed.yaml

model:
  model: output/stage2_ab/prod/pseudo_positive-ckpt_300_merged-v1

training:
  num_train_epochs: 1
  run_name: k_4-eff_size_96-b_ratio_0.85-epoch_1-global_struct_ce_fixed-stronger_FN-from_300_v1
  output_dir: output/stage2_ab/prod/pseudo_positive
  logging_dir: tb/stage2_ab/prod/pseudo_positive

template:
  max_pixels: 1048576

stage2_ab:
  schedule:
    b_ratio: 0.85
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.5
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 2.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          smoothl1_weight: 1.0
          ciou_weight: 0.5
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          coord_ce_weight: 0.02
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
  channel_b:
    duplicate_iou_threshold: 0.95
    pseudo_positive:
      enabled: true
      coord_weight: 0.3
    triage_posterior:
      num_rollouts: 4
      explorer_temperature: 0.7
      explorer_top_p: 0.95
      explorer_top_k: 64
      unlabeled_consistent_iou_threshold: 0.9
      recovered_ground_truth_weight_multiplier: 3.0

custom:
  offline_max_pixels: 1048576
  train_jsonl: public_data/coco/rescale_32_1024_bbox_max60/train.coord.jsonl
  val_jsonl: public_data/coco/rescale_32_1024_bbox_max60/val.coord.jsonl

rollout_matching:
  train_monitor_dump:
    every_channel_b_steps: 30
  max_new_tokens: 3084
  vllm:
    gpu_memory_utilization: 0.9
