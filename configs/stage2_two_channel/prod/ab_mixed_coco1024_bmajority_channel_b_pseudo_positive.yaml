extends: ./ab_mixed.yaml

model:
  model: output/a_only/ciou_bbox_area-ckpt_900-merged

training:
  num_train_epochs: 1
  run_name: k_4-eff_size_96-b_ratio_0.75-epoch_1
  output_dir: output/stage2_ab/prod/pseudo_positive
  logging_dir: tb/stage2_ab/prod/pseudo_positive

template:
  max_pixels: 1048576

stage2_ab:
  schedule:
    b_ratio: 0.75
  channel_b:
    pseudo_positive:
      enabled: true
      coord_weight: 0.5
    triage_posterior:
      num_rollouts: 4
      explorer_temperature: 0.7
      explorer_top_p: 0.95
      explorer_top_k: 64
      unlabeled_consistent_iou_threshold: 0.9
      recovered_ground_truth_weight_multiplier: 2.0

custom:
  offline_max_pixels: 1048576
  train_jsonl: public_data/coco/rescale_32_1024_bbox_max60/train.coord.jsonl
  val_jsonl: public_data/coco/rescale_32_1024_bbox_max60/val.coord.jsonl

rollout_matching:
  train_monitor_dump:
    every_channel_b_steps: 30
  max_new_tokens: 3084
  vllm:
    gpu_memory_utilization: 0.9
