extends: ../prod/a_only.yaml

# Single-pass Channel-A baseline with explicit anchor-only objective routing.
model:
  model: output/stage1_2b/hardce_softce-ckpt_1344-merged

training:
  run_name: epoch_2-eff_size_64-a_only_single_pass
  output_dir: output/stage2_ab/coco_bbox_max60/a_only_single_pass
  logging_dir: tb/stage2_ab/coco_bbox_max60/a_only_single_pass

stage2_ab:
  schedule:
    b_ratio: 0.0
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.0
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          # Required: SmoothL1 on decoded bbox geometry.
          smoothl1_weight: 1.0
          ciou_weight: 0.5
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          # Required: hard CE on coord-token bins (coord tokens are NOT covered by text/struct CE).
          coord_ce_weight: 0.04
          # Required: gating at coord-token positions.
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          # Required: distribution losses at coord-token positions.
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}
