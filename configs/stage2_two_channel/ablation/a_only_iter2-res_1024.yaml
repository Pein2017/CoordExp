extends: a_only_iter1-res_1024.yaml

# 1024-res random-order ablation with 4 soft-context iterations.
#
# NOTE: the current Stage-2 trainer still routes bbox/coord supervision through the
# existing A1/final-A2 contract when n_softctx_iter > 1. This config sets n_softctx_iter
# to 4 and keeps the conservative weights we discussed; a true A1/A2/A3/A4 per-iteration
# routing scheme would require a trainer/schema change.
model:
  model: output/stage2_ab/coco_bbox_max60/a_only/epoch_2-eff_size_64-n_softctx_iter_2-merged

training:
  seed: 17
  run_name: epoch-1-eff_bs_128
  output_dir: output/a_only/random_order-iter_2
  logging_dir: tb/a_only/random_order-iter_2
  num_train_epochs: 1
  effective_batch_size: 128
  encoded_sample_cache:
    enabled: false

template:
  max_pixels: 1048576

custom:
  offline_max_pixels: 1048576
  train_jsonl: public_data/coco/rescale_32_1024_bbox_max60/train.coord.jsonl
  val_jsonl: public_data/coco/rescale_32_1024_bbox_max60/val.coord.jsonl
  object_ordering: random

stage2_ab:
  n_softctx_iter: 2
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_plus_final_struct
        config:
          desc_ce_weight: 1.0
          struct_ce_weight: 0.1
          rollout_fn_desc_weight: 1.0
          rollout_matched_prefix_struct_weight: 1.0
      - name: loss_dead_anchor_suppression
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          smoothl1_weight: 2.0
          ciou_weight: 0.2
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          coord_ce_weight: 0.02
          coord_el1_weight: 0.0
          coord_ehuber_weight: 0.0
          coord_huber_delta: 0.001
          coord_entropy_weight: 0.0
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}
