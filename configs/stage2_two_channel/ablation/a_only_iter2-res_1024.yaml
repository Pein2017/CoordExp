extends: a_only_iter1-res_1024.yaml

# 1024-res random-order ablation with the conservative single-pass anchor-only mix.
model:
  model: output/stage2_ab/coco_bbox_max60/a_only/epoch_2-eff_size_64-add_coord_ce-merged

training:
  seed: 17
  run_name: epoch-1-eff_bs_128-random_order_conservative
  artifact_subdir: a_only/random_order_conservative
  num_train_epochs: 1
  effective_batch_size: 128
  encoded_sample_cache:
    enabled: false

custom:
  object_ordering: random

stage2_ab:
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.0
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          smoothl1_weight: 2.0
          ciou_weight: 0.2
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          coord_ce_weight: 0.02
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}
