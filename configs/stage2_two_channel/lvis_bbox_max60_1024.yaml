extends:
  - ./base.yaml
  - ../_shared/datasets/lvis_1024_bbox_max60.yaml
  - ../_shared/prompts/lvis_stage2_federated.yaml

model:
  model: output/stage1/lvis_bbox_max60_1024/hard_ce_soft_ce_w1_ciou_bbox_size-ckpt_232-merged

training:
  run_name: epoch_2-stage2-lvis_bbox_max60_1024-hard_ce_soft_ce_w1_ciou_bbox_size
  artifact_subdir: stage2_ab/lvis_bbox_max60_1024

stage2_ab:
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.0
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          smoothl1_weight: 0.0
          ciou_weight: 1.0
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          coord_ce_weight: 1.0
          coord_gate_weight: 5.0
          text_gate_weight: 0.0
          soft_ce_weight: 1.0
          w1_weight: 1.0
          temperature: 0.9
          target_sigma: 1.5
          target_truncate: 8
          adjacent_repulsion_weight: 0.0
          adjacent_repulsion_filter_mode: same_desc
          adjacent_repulsion_margin_ratio: 0.05
          adjacent_repulsion_copy_margin: 0.8

rollout_matching:
  eval_detection:
    # The cached 1024/max60 LVIS Stage-1 export is metadata-light, so keep the
    # default training-time diagnostic metric FP-neutral until a metadata-bearing
    # LVIS JSONL is regenerated for official federated eval.
    metrics: f1ish
