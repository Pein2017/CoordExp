extends: ./a_only.yaml

experiment:
  title: Stage-2 A-only center-size smoke
  purpose: >
    Smoke-test the Stage-2 A-only path with center-size bbox regression enabled
    and a minimal two-step runtime budget.
  hypothesis: >
    The center-size bbox_geo parameterization should resolve cleanly through the
    A-only Stage-2 trainer without changing the canonical xyxy artifact
    contract.
  baseline: Standard Stage-2 A-only smoke without center-size bbox_geo.
  key_deviations:
    - "Uses bbox_geo.config.parameterization: center_size with center_weight 1.0 and size_weight 0.25."
    - Limits training to two optimizer steps and disables eval/save for smoke validation.
  runtime_settings:
    - Runs the stage2_two_channel trainer in A-only mode.
    - Keeps artifacts under the shared stage2_ab smoke subtree while using a concise run_name.
  comments:
    - Use this profile to validate the center-size supervision path, not to compare model quality.
  tags:
    - stage2
    - smoke
    - a-only
    - center-size

training:
  run_name: stage2_a_only_center_size_smoke
  artifact_subdir: stage2_ab/smoke/a_only_center_size_2steps
  max_steps: 2
  eval_strategy: "no"
  save_strategy: "no"

stage2_ab:
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.0
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          smoothl1_weight: 2.0
          ciou_weight: 0.2
          parameterization: center_size
          center_weight: 1.0
          size_weight: 0.25
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          coord_ce_weight: 0.02
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
          adjacent_repulsion_weight: 0.0
          adjacent_repulsion_filter_mode: same_desc
          adjacent_repulsion_margin_ratio: 0.05
          adjacent_repulsion_copy_margin: 0.8
