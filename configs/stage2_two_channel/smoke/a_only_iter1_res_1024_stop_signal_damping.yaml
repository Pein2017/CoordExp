extends: ../ablation/a_only_iter1-res_1024.yaml

model:
  model: /data/home/xiaoyan/AIteam/data/CoordExp/output/stage2_ab/2b_1024/a_only_iter1/merged_ckpt-900

training:
  run_name: smoke_a_only_iter1_res1024_stop_signal_damping
  output_dir: output/stage2_ab/smoke/a_only_iter1_res1024_stop_signal_damping
  logging_dir: tb/stage2_ab/smoke/a_only_iter1_res1024_stop_signal_damping
  effective_batch_size: 8
  eval_strategy: "no"
  save_strategy: steps
  save_steps: 2
  max_steps: 4
  save_delay_steps: 0
  logging_steps: 1
  do_eval: false

custom:
  train_jsonl: /data/home/xiaoyan/AIteam/data/CoordExp/public_data/coco/rescale_32_1024_bbox_max60/train.coord.jsonl
  val_jsonl: /data/home/xiaoyan/AIteam/data/CoordExp/public_data/coco/rescale_32_1024_bbox_max60/val.coord.jsonl
  train_sample_limit: 128
  val_sample_limit: 16

stage2_ab:
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_plus_final_struct
        config:
          desc_ce_weight: 1.0
          struct_ce_weight: 0.1
          rollout_fn_desc_weight: 1.0
          rollout_matched_prefix_struct_weight: 1.0
          stop_signal_damping:
            enabled: false
            min_weight: 0.3
            max_weight: 0.75
            branch_temperature: 1.25
            curve_gamma: 2.0
            detach_gate: true
      - name: loss_dead_anchor_suppression
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          smoothl1_weight: 1.0
          ciou_weight: 0.5
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_if_single_iter_else_final
        config:
          coord_ce_weight: 0.04
          coord_el1_weight: 0.0
          coord_ehuber_weight: 0.0
          coord_huber_delta: 0.001
          coord_entropy_weight: 0.0
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}

