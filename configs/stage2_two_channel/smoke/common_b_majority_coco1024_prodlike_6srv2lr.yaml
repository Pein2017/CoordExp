extends: ../prod/ab_mixed.yaml

model:
  model: /data/CoordExp/output/stage2_ab/prod/ul-res_1024-v2-ckpt_300_merged

training:
  num_train_epochs: 1
  effective_batch_size: 8
  logging_steps: 1
  save_delay_steps: 0

template:
  max_pixels: 1048576

data:
  dataloader_num_workers: 0
  dataloader_prefetch_factor: null
  dataloader_persistent_workers: false

stage2_ab:
  schedule:
    b_ratio: 0.75
  channel_b:
    duplicate_iou_threshold: 0.90
    ddp_phase_timeout_s: 120.0

custom:
  offline_max_pixels: 1048576
  train_jsonl: /data/CoordExp/public_data/coco/rescale_32_1024_bbox_max60/train.coord.jsonl
  val_jsonl: /data/CoordExp/public_data/coco/rescale_32_1024_bbox_max60/val.coord.jsonl
  train_sample_limit: 96
  val_sample_limit: 8

rollout_matching:
  rollout_backend: vllm
  eval_rollout_backend: vllm
  channel_b_decode_batch_size: 6
  eval_decode_batch_size: 6
  max_new_tokens: 3084
  train_monitor_dump:
    every_channel_b_steps: 30
    enabled: true
    every_steps: 1
    max_events: 12
    max_samples: 2
    max_text_chars: 4000
    write_markdown: false
  eval_monitor_dump:
    enabled: true
    every_evals: 1
    max_events: 6
    max_samples: 1
    max_text_chars: 4000
    write_markdown: false
  vllm:
    mode: server
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.75
    reinit_each_eval: false
