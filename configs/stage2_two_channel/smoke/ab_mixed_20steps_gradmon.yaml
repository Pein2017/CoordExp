extends: ./ab_mixed_20steps.yaml

training:
  run_name: smoke_ab_mixed_20steps_gradmon
  output_dir: output/stage2_ab/smoke/ab_mixed_20steps_gradmon
  logging_dir: tb/stage2_ab/smoke/ab_mixed_20steps_gradmon

custom:
  extra:
    loss_gradient_monitor:
      enabled: true
      interval_steps: 1
      ema_beta: 0.98
      require_sync_gradients: true
      coord_only: true
      granularity: atomic
      param_block:
        strategy: auto_last_lm_layernorm
        max_params: 64
        max_numel: 200000
