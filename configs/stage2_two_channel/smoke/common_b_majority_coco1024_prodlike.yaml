extends: ../prod/ab_mixed_coco1024_bmajority.yaml

training:
  effective_batch_size: 64
  logging_steps: 1
  save_delay_steps: 0

data:
  dataloader_num_workers: 0
  dataloader_prefetch_factor: null
  dataloader_persistent_workers: false

stage2_ab:
  channel_b:
    duplicate_iou_threshold: 0.90
    ddp_phase_timeout_s: 120.0

custom:
  train_sample_limit: 512
  val_sample_limit: 16

rollout_matching:
  rollout_backend: vllm
  eval_rollout_backend: vllm
  channel_b_decode_batch_size: 8
  eval_decode_batch_size: 8
  max_new_tokens: 3084
  monitor_dump:
    enabled: true
    every_steps: 1
    max_events: 50
    max_samples: 1
    max_text_chars: 4000
    write_markdown: false
  vllm:
    mode: server
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.75
    reinit_each_eval: false
