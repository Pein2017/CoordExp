extends: ../prod/ab_mixed_server.yaml


training:
  run_name: smoke_ab_mixed_20steps
  output_dir: output/stage2_ab/smoke/ab_mixed_20steps
  logging_dir: tb/stage2_ab/smoke/ab_mixed_20steps
  effective_batch_size: 64
  packing_min_fill_ratio: 0.5
  eval_strategy: steps
  eval_steps: 10
  save_strategy: steps
  save_steps: 20
  max_steps: 20
  save_delay_steps: 0
  logging_steps: 1
  do_eval: true

custom:
  train_sample_limit: 2048
  val_sample_limit: 64

rollout_matching:
  rollout_backend: vllm
  eval_rollout_backend: vllm
  max_new_tokens: 2048
  channel_b_decode_batch_size: 16
  eval_decode_batch_size: 16
  vllm:
    mode: server
    reinit_each_eval: false
    gpu_memory_utilization: 0.80
    server:
      servers:
        - base_url: http://127.0.0.1:8000
          group_port: 51216
