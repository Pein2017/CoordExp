training:
  num_train_epochs: 2
  learning_rate: 2.0e-5
  vit_lr: 2.0e-5
  aligner_lr: 5.0e-5
  eval_strategy: steps
  eval_steps: 300
  save_strategy: steps
  save_steps: 300
  do_eval: true
  metric_for_best_model: detection/mAP

custom:
  extra:
    prompt_variant: coco_80
    loss_gradient_monitor:
      enabled: true
      interval_steps: 50
      ema_beta: 0.98
      require_sync_gradients: true
      coord_only: true
      granularity: atomic
      param_block:
        strategy: auto_last_lm_layernorm
        max_params: 64
        max_numel: 200000
