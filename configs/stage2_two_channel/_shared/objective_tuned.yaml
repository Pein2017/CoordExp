stage2_ab:
  channel_b:
    duplicate_control:
      iou_threshold: 0.95
      center_radius_scale: 0.8
    ddp_phase_timeout_s: 120.0
  pipeline:
    objective:
      - name: token_ce
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_text_only
        config:
          desc_ce_weight: 1.0
          rollout_fn_desc_weight: 1.0
          rollout_global_prefix_struct_ce_weight: 1.0
      - name: loss_duplicate_burst_unlikelihood
        enabled: true
        weight: 1.0
        channels: [B]
        application:
          preset: rollout_only
        config: {}
      - name: bbox_geo
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          smoothl1_weight: 1.0
          ciou_weight: 0.5
      - name: bbox_size_aux
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          log_wh_weight: 0.05
          oversize_penalty_weight: 0.0
          oversize_area_frac_threshold: null
          oversize_log_w_threshold: null
          oversize_log_h_threshold: null
          eps: 1.0e-6
      - name: coord_reg
        enabled: true
        weight: 1.0
        channels: [A, B]
        application:
          preset: anchor_only
        config:
          coord_ce_weight: 0.02
          coord_gate_weight: 1.0
          text_gate_weight: 0.1
          soft_ce_weight: 0.1
          w1_weight: 0.02
          temperature: 1.0
          target_sigma: 2.0
          target_truncate: 8
          adjacent_repulsion_weight: 0.0
          adjacent_repulsion_filter_mode: same_desc
          adjacent_repulsion_margin_ratio: 0.05
          adjacent_repulsion_copy_margin: 0.8
    diagnostics:
      - name: coord_diag
        enabled: true
        weight: 1.0
        channels: [A, B]
        config: {}
