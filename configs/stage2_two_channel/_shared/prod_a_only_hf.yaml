extends:
  - ../base.yaml
  - ./objective_tuned.yaml
  - ./prod_common.yaml

training:
  effective_batch_size: 64

stage2_ab:
  schedule:
    b_ratio: 0.0

rollout_matching:
  # Override rollout backend inherited from configs/stage2_two_channel/base.yaml.
  rollout_backend: hf
  # Keep A-only eval on HF; vLLM is reserved for Channel-B training profiles.
  eval_rollout_backend: hf
  channel_b_decode_batch_size: 8
  eval_decode_batch_size: 8
  max_new_tokens: 3084
  monitor_dump:
    enabled: true
    every_steps: 300
    max_events: 0
    max_samples: 10
    max_text_chars: 0
    write_markdown: false
