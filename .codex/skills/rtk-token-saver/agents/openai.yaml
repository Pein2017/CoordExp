interface:
  display_name: "RTK Token Saver"
  short_description: "Use RTK for noisy shell output, not exact stdout"
  default_prompt: "Use $rtk-token-saver for noisy shell work such as broad search, docs reads, git output, tests, logs, and discovery. Preserve project wrappers like `conda run -n ms`; bypass RTK for exact stdout, machine-readable output, delicate quoting, tiny commands, or Python symbol reasoning that should use Serena."

policy:
  allow_implicit_invocation: true
